name: CI

on:
  push:
    branches: [master, develop, 'release/**']
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # ── Dev builds (develop) — artifact only, not on Releases ──────────────────
  package-dev:
    name: Package Dev VSIX
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp dev version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          export DEV_VERSION="0.0.${RUN_NUMBER}"
          DISPLAY_VERSION="0.0.0.${RUN_NUMBER}-dev"
          echo "VERSION=${DISPLAY_VERSION}" >> $GITHUB_OUTPUT
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/vscode/package.json', 'utf8'));
            pkg.version = '${DEV_VERSION}';
            fs.writeFileSync('./apps/vscode/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Stamped dev version: ${DEV_VERSION} (artifact: ${DISPLAY_VERSION})"

      - name: Build all packages
        run: pnpm build

      - name: Package VSIX
        run: |
          cp LICENSE apps/vscode/
          cd apps/vscode && pnpm run build:ext:prod && pnpm run build:webview:prod && npx @vscode/vsce package --no-dependencies --pre-release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: event-horizon-${{ steps.version.outputs.VERSION }}.vsix
          path: apps/vscode/*.vsix
          retention-days: 30

  cleanup-dev-artifacts:
    name: Cleanup old dev artifacts
    runs-on: ubuntu-latest
    needs: package-dev
    permissions:
      actions: write

    steps:
      - name: Delete old dev artifacts (keep latest 3)
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const devArtifacts = artifacts.data.artifacts
              .filter(a => a.name.includes('-dev'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = devArtifacts.slice(3);
            for (const artifact of toDelete) {
              console.log(`Deleting old dev artifact: ${artifact.name} (${artifact.created_at})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
            console.log(`Kept ${Math.min(devArtifacts.length, 3)} dev artifacts, deleted ${toDelete.length}`);

  # ── Pre-releases (release/* branches) — alpha/beta/rc on Releases page ─────
  package-prerelease:
    name: Package Pre-release VSIX
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine pre-release version
        id: version
        run: |
          # Extract base version from branch name: release/0.1.0 → 0.1.0
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          BASE_VERSION="${BRANCH}"

          # Count existing pre-release tags for this version to auto-increment
          git fetch --tags
          ALPHA_COUNT=$(git tag -l "v${BASE_VERSION}-alpha.*" | wc -l)
          BETA_COUNT=$(git tag -l "v${BASE_VERSION}-beta.*" | wc -l)
          RC_COUNT=$(git tag -l "v${BASE_VERSION}-rc.*" | wc -l)
          TOTAL=$((ALPHA_COUNT + BETA_COUNT + RC_COUNT))

          # Determine stage based on count: first 3 = alpha, next 3 = beta, then rc
          # Or read from commit message if [alpha], [beta], or [rc] is present
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[rc\]'; then
            STAGE="rc"
            NUM=$((RC_COUNT + 1))
          elif echo "$COMMIT_MSG" | grep -qi '\[beta\]'; then
            STAGE="beta"
            NUM=$((BETA_COUNT + 1))
          else
            STAGE="alpha"
            NUM=$((ALPHA_COUNT + 1))
          fi

          PRE_VERSION="${BASE_VERSION}-${STAGE}.${NUM}"
          # VS Code needs clean 3-digit for the internal version
          VSCE_VERSION="${BASE_VERSION}"
          TAG="v${PRE_VERSION}"

          echo "VERSION=${PRE_VERSION}" >> $GITHUB_OUTPUT
          echo "VSCE_VERSION=${VSCE_VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "Pre-release: ${PRE_VERSION} (vsce: ${VSCE_VERSION}, tag: ${TAG})"

      - name: Stamp version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/vscode/package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.VSCE_VERSION }}';
            fs.writeFileSync('./apps/vscode/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build all packages
        run: pnpm build

      - name: Package VSIX
        run: |
          cp LICENSE apps/vscode/
          cd apps/vscode && pnpm run build:ext:prod && pnpm run build:webview:prod && npx @vscode/vsce package --no-dependencies --pre-release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: event-horizon-${{ steps.version.outputs.VERSION }}.vsix
          path: apps/vscode/*.vsix
          retention-days: 90

      - name: Create pre-release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.VERSION }}
          files: apps/vscode/*.vsix
          prerelease: true
          generate_release_notes: true

  cleanup-prereleases:
    name: Cleanup old pre-releases
    runs-on: ubuntu-latest
    needs: package-prerelease
    permissions:
      contents: write

    steps:
      - name: Delete old pre-releases (keep latest 5)
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const prereleases = releases.data
              .filter(r => r.prerelease)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = prereleases.slice(5);
            for (const rel of toDelete) {
              console.log(`Deleting old pre-release: ${rel.tag_name} (${rel.created_at})`);
              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id,
              });
              // Delete the tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${rel.tag_name}`,
                });
              } catch (e) {
                console.log(`Tag ${rel.tag_name} already deleted or not found`);
              }
            }
            console.log(`Kept ${Math.min(prereleases.length, 5)} pre-releases, deleted ${toDelete.length}`);

  # ── Stable releases (master) — tagged release on Releases page ─────────────
  release:
    name: Create Stable Release
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/vscode/package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Build all packages
        run: pnpm build

      - name: Package VSIX
        run: |
          cp LICENSE apps/vscode/
          cd apps/vscode && pnpm run package:vsix

      - name: Create git tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git fetch --tags
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping release"
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.TAG_EXISTS != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: apps/vscode/*.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: steps.tag.outputs.TAG_EXISTS != 'true'
        run: cd apps/vscode && npx @vscode/vsce publish --no-dependencies --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.tag.outputs.TAG_EXISTS != 'true'
        continue-on-error: true
        run: cd apps/vscode && npx ovsx publish --no-dependencies --packagePath *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
